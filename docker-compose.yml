version: "3.8"
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ordering-rabbitmq
    ports:
      - "5672:5672"   # The port your code uses to talk to RabbitMQ
      - "15672:15672" # The port for the Web UI Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123